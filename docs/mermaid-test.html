<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mermaid render test</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #f4f6f9; color: #1b2330; }
    #status { display: inline-block; font-weight: 700; padding: 0.5rem 0.85rem; border-radius: 8px; margin-bottom: 1.5rem; }
    .ok  { background: #dcfce7; color: #14532d; }
    .err { background: #fee2e2; color: #7f1d1d; }
    .mermaid { background: #fff; border: 1px solid #dde2ea; border-radius: 12px; padding: 1.5rem; }
  </style>
</head>
<body>
  <h1>Mermaid render test</h1>
  <div id="status" class="err">Loading…</div>

  <pre class="mermaid">
flowchart TD
  A([Start]) --> B{Is it working?}
  B -- Yes --> C[Great, use it]
  B -- No --> D[Fix the wiring]
  </pre>

  <script src="./mermaid.min.js"></script>
  <script>
    const s = document.getElementById('status');
    try {
      if (!window.mermaid) throw new Error('mermaid global not found — script did not load');
      mermaid.initialize({ startOnLoad: false });
      mermaid.run({ querySelector: '.mermaid' })
        .then(() => { s.textContent = '✅ Mermaid loaded and rendered the diagram.'; s.className = 'ok'; })
        .catch((e) => { s.textContent = '❌ Render failed: ' + e.message; s.className = 'err'; console.error(e); });
    } catch (e) {
      s.textContent = '❌ ' + e.message; s.className = 'err'; console.error(e);
    }
  </script>
</body>
</html>
