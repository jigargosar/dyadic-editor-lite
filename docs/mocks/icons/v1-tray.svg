<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimum version of v1.svg for small sizes (tray, favicon): no gradients,
       no sheen, no ghost cursor. Flat solid fills with high tile/block contrast
       and an enlarged, centered block so the glyph reads down to 16px. -->

  <!-- tile -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="#4C3AD6"/>

  <!-- primary vim block cursor, centered and bolder -->
  <rect x="161" y="131" width="190" height="250" rx="36" fill="#2DE3C0"/>
</svg>
