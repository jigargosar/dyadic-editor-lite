<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D5EF9"/>
      <stop offset="1" stop-color="#3B1FB0"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="block" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#22D3A6"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#sheen)"/>

  <!-- ghost cursor (the second of the dyad) -->
  <rect x="150" y="150" width="150" height="212" rx="28" fill="#ffffff" opacity="0.16"/>

  <!-- primary vim block cursor -->
  <rect x="212" y="150" width="150" height="212" rx="28" fill="url(#block)"/>
</svg>
